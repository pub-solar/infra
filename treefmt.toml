[formatter.shell]
command = "shfmt"
options = [
  "-s",
  "-w",
  "-i",
  "2",
]
includes = ["*.sh"]

[formatter.terraform]
command = "tofu"
options = [
  "fmt"
]
includes = ["*.tf"]
