excludes = [
  "*.crt",
  "*.hcl",
  ".editorconfig",
  ".envrc",
  ".gitignore",
  ".git-blame-ignore-revs",
  "*.lock",
  "*.patch",
  "*.txt",
  "treefmt.toml",
  "secrets/*",
  "*/secrets/*",
  "modules/grafana/grafana-dashboards/*",
  "overlays/pkgs/nextcloud-skeleton/*",
]

[formatter.nix]
command = "nix"
options = ["fmt"]
includes = ["*.nix"]
excludes = []

